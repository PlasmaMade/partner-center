<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Testdocumenten &amp; onderbouwing - PlasmaMade Partner Center</title>
<meta name="description" content="Testrapporten, certificeringen en onafhankelijk bewijs van PlasmaMade.">
<link rel="icon" href="assets/img/logo/logo-green.png">
<link rel="stylesheet" href="ds-bundle/styles.css">
<link rel="stylesheet" href="assets/css/style.css?v=20260630-rollback-stable-bjorn-2">
</head>
<body data-page="testdocs">
<div class="layout">
  <aside id="pm-sidebar"></aside>
  <div class="main">
    <div id="pm-topbar"></div>
    <main class="content">
      <div class="page-head">
        <h2 data-i18n="nav.testdocs">Testdocumenten</h2>
        <p data-i18n="td.intro">Onafhankelijk bewijs voor de prestaties en veiligheid van PlasmaMade.</p>
      </div>

      <!-- Highlight: Interflow -->
      <div class="card" style="background:var(--green-grad);border:none;color:#fff;margin-bottom:26px">
        <div class="card__body" style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;padding:28px 32px">
          <div style="flex:1;min-width:260px">
            <span class="badge" style="background:rgba(255,255,255,.18);color:#fff" data-i18n="td.highlightBadge">Belangrijkste bewijs</span>
            <h3 style="color:#fff;font-size:23px;margin:10px 0 6px" data-i18n="td.highlightTitle">Interflow-onderzoek (2024)</h3>
            <p style="opacity:.95;margin:0;max-width:560px" data-i18n="td.highlightText">De AirClean UltraFine presteert vrijwel identiek aan een HEPA-filter (R2 = 0,996).</p>
          </div>
          <div class="flex gap wrap">
            <a class="btn btn--white" href="assets/testdocs/interflow-onderzoek.pdf" download data-i18n="td.downloadDoc">Download onderzoek</a>
            <a class="btn" style="background:rgba(255,255,255,.16);color:#fff" href="article.html?id=interflow" data-i18n="td.readExplain">Lees de uitleg</a>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-box" id="sb"></div>
        <select class="select" id="f-prod"></select>
        <select class="select" id="f-use"></select>
        <span class="result-count" id="rc" aria-live="polite"></span>
      </div>

      <div class="chips" id="cat-filter" style="margin-bottom:18px"></div>
      <div id="td-list"></div>
    </main>
    <div id="pm-footer"></div>
  </div>
</div>

<script src="assets/js/i18n.js?v=20260630-rollback-stable-bjorn-2"></script>
<script src="assets/js/data.js?v=20260630-rollback-stable-bjorn-2"></script>
<script>
window.PM_PAGE_INIT = function () {
  var D = window.PM_DATA, T = D.testdocs, t = window.PM_t, esc = window.PM_escape, lc = window.PM_lc;
  document.title = t("nav.testdocs") + " - PlasmaMade Partner Center";
  document.getElementById("sb").innerHTML = PM_ICON("search") + '<input type="text" id="q" placeholder="' + esc(t("td.searchPh")) + '" aria-label="' + esc(t("td.searchPh")) + '">';
  function uniq(a) { return a.filter(function (v, i) { return a.indexOf(v) === i; }); }
  var cats = uniq(T.map(function (td) { return td.category; }));
  var current = window.__tdCat || "*";
  document.getElementById("f-prod").innerHTML = '<option value="">' + esc(t("td.allProducts")) + '</option>' + uniq(T.map(function (td) { return td.product; })).map(function (p) { return '<option value="' + esc(p) + '">' + esc(PM_dict("audiences", p)) + '</option>'; }).join("");
  document.getElementById("f-use").innerHTML = '<option value="">' + esc(t("td.useAll")) + '</option>' + ["Technisch", "Commercieel", "Beide"].map(function (u) { return '<option value="' + u + '">' + esc(PM_dict("usages", u)) + '</option>'; }).join("");
  document.getElementById("f-prod").setAttribute("aria-label", t("td.allProducts"));
  document.getElementById("f-use").setAttribute("aria-label", t("td.useAll"));
  var useColor = { Technisch: "badge--info", Commercieel: "badge--green-soft", Beide: "badge--warn" };

  function chips() {
    var all = [["*", t("common.all"), T.length]].concat(cats.map(function (c) {
      return [c, PM_dict("categories", c), T.filter(function (td) { return td.category === c; }).length];
    }));
    document.getElementById("cat-filter").innerHTML = all.map(function (c) {
      return '<button class="chip' + (c[0] === current ? " active" : "") + '" data-c="' + esc(c[0]) + '" aria-pressed="' + (c[0] === current) + '">' + esc(c[1]) + ' <b style="opacity:.6">' + c[2] + '</b></button>';
    }).join("");
    document.querySelectorAll("#cat-filter .chip").forEach(function (b) {
      b.addEventListener("click", function () { current = window.__tdCat = b.getAttribute("data-c"); chips(); render(); });
    });
  }
  function render() {
    var q = (document.getElementById("q").value || "").toLowerCase();
    var fp = document.getElementById("f-prod").value, fu = document.getElementById("f-use").value;
    var list = T.filter(function (td) {
      var title = lc("testdocs", td.id, "title", td.title), con = lc("testdocs", td.id, "conclusion", td.conclusion);
      return (current === "*" || td.category === current) &&
             (!q || (td.title + " " + title + " " + td.product + " " + con + " " + td.conclusion).toLowerCase().indexOf(q) > -1) &&
             (!fp || td.product === fp) && (!fu || td.usage === fu);
    });
    document.getElementById("rc").textContent = list.length === 1 ? t("td.countOne") : t("td.count", { n: PM_fmtNum(list.length) });
    var groups = {};
    list.forEach(function (td) { (groups[td.category] = groups[td.category] || []).push(td); });
    var html = "";
    Object.keys(groups).forEach(function (g) {
      html += '<div class="section-title" style="margin-top:18px"><h3>' + esc(PM_dict("categories", g)) + '</h3><div class="line"></div><span class="muted" style="font-size:12px">' + groups[g].length + '</span></div>';
      html += '<div class="grid grid--2" style="align-items:start">';
      groups[g].forEach(function (td) {
        html += '<div class="card card--hover" id="t-' + td.id + '"><div class="card__body" style="display:flex;gap:14px">' +
          '<span style="width:44px;height:44px;border-radius:11px;background:var(--green-100);color:var(--green-700);display:grid;place-items:center;flex-shrink:0">' + PM_ICON("shieldCheck") + '</span>' +
          '<div style="flex:1;min-width:0">' +
            '<div class="flex items-center gap wrap" style="margin-bottom:4px"><span class="badge ' + (useColor[td.usage] || "badge--grey") + '">' + esc(PM_dict("usages", td.usage)) + '</span><span class="tag-static">' + esc(PM_dict("audiences", td.product)) + '</span></div>' +
            '<h4 style="font-size:15.5px;margin-bottom:6px">' + esc(lc("testdocs", td.id, "title", td.title)) + '</h4>' +
            '<p class="muted" style="font-size:13px;margin-bottom:12px"><b style="color:var(--ink)">' + esc(t("td.conclusion")) + '</b> ' + esc(lc("testdocs", td.id, "conclusion", td.conclusion)) + '</p>' +
            '<div class="flex items-center between gap wrap">' +
              '<span class="asset__meta"><span>' + PM_ICON("fileText") + 'PDF · ' + esc(PM_fmtSize(td.size)) + '</span><span title="' + esc(t("common.docLang")) + '">' + PM_ICON("globe") + esc(PM_dict("langLabels", td.lang)) + '</span></span>' +
              '<a class="btn btn--ghost btn--sm" href="assets/testdocs/' + td.file + '.pdf" download>' + PM_ICON("download") + esc(t("common.download")) + '</a>' +
            '</div>' +
          '</div></div></div>';
      });
      html += '</div>';
    });
    document.getElementById("td-list").innerHTML = html || '<div class="empty">' + PM_ICON("shieldCheck") + '<h4>' + esc(t("td.emptyTitle")) + '</h4></div>';
    var focus = PM_param("focus");
    if (focus) { var el = document.getElementById("t-" + focus); if (el) { el.style.outline = "2px solid var(--green)"; el.scrollIntoView({ behavior: "smooth", block: "center" }); } }
  }
  if (!window.__tdBound) {
    window.__tdBound = true;
    document.addEventListener("input", function (e) { if (e.target && e.target.id === "q") render(); });
  }
  ["f-prod", "f-use"].forEach(function (id) { document.getElementById(id).addEventListener("change", render); });
  chips(); render();
};
</script>
<script src="assets/js/sync-config.js?v=20260630-rollback-stable-bjorn-2"></script>
<script src="assets/js/app.js?v=20260630-rollback-stable-bjorn-2"></script>
</body>
</html>
