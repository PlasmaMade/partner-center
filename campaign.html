<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campagne - PlasmaMade Partner Center</title>
<meta name="description" content="PlasmaMade-campagnedetails, kernboodschap en marketingmateriaal voor partners.">
<link rel="icon" href="assets/img/logo/logo-green.png">
<link rel="stylesheet" href="ds-bundle/styles.css">
<link rel="stylesheet" href="assets/css/style.css?v=20260630-rollback-stable-bjorn-1">
</head>
<body data-page="campaign">
<div class="layout">
  <aside id="pm-sidebar"></aside>
  <div class="main">
    <div id="pm-topbar"></div>
    <main class="content" id="camp-root"></main>
    <div id="pm-footer"></div>
  </div>
</div>

<script src="assets/js/i18n.js?v=20260630-rollback-stable-bjorn-1"></script>
<script src="assets/js/data.js?v=20260630-rollback-stable-bjorn-1"></script>
<script>
window.PM_PAGE_INIT = function () {
  var D = window.PM_DATA, t = window.PM_t, esc = window.PM_escape, lc = window.PM_lc;
  var idParam = PM_param("id");
  var c = idParam ? D.campaigns.find(function (x) { return x.id === idParam; }) : D.campaigns[0];
  if (!c) {
    PM_notFound(document.getElementById("camp-root"), {
      title: t("camp.notFoundTitle"), text: t("camp.notFoundText"),
      href: "campaigns.html", back: t("camp.back"), cta: t("camp.all")
    });
    return;
  }
  var title = lc("campaigns", c.id, "title", c.title);
  var core = lc("campaigns", c.id, "core", c.core);
  var captions = lc("campaigns", c.id, "captions", c.captions || []);
  var planning = lc("campaigns", c.id, "planning", c.planning || []);
  document.title = title + " - PlasmaMade Partner Center";
  var tb = document.querySelector(".topbar__title h1"); if (tb) tb.textContent = title;
  PM_RECENT.push("campaign", c.id);

  var assets = (c.assets || []).map(function (aid) { return D.marketing.find(function (m) { return m.id === aid; }); }).filter(Boolean);

  function metaCard(ic, label, val) {
    return '<div class="stat"><div class="s-top"><span>' + esc(label) + '</span>' + PM_ICON(ic) + '</div><div style="font-size:15px;font-weight:700;color:var(--black);margin-top:6px;line-height:1.3">' + esc(val) + '</div></div>';
  }

  document.getElementById("camp-root").innerHTML =
    '<a href="campaigns.html" class="flex items-center gap green" style="font-weight:700;font-size:13px;margin-bottom:18px"><span style="display:inline-flex;transform:rotate(180deg)">' + PM_ICON("arrowRight") + '</span>' + esc(t("camp.back")) + '</a>' +

    // Hero
    '<div class="hero" style="padding:0;overflow:hidden;align-items:stretch;min-height:260px;margin-bottom:26px">' +
      '<div class="hero__txt" style="padding:34px 38px;display:flex;flex-direction:column;justify-content:center">' +
        '<div><span class="badge" style="background:rgba(255,255,255,.18);color:#fff">' + esc(PM_dict("statuses", c.status)) + '</span></div>' +
        '<h2 style="margin:12px 0 10px">' + esc(title) + '</h2>' +
        '<p style="margin-bottom:18px">' + esc(core) + '</p>' +
        '<div class="flex gap wrap"><a href="studio.html?template=campagne-getfresh" class="btn btn--white">' + PM_ICON("palette") + esc(t("camp.makeMaterial")) + '</a>' +
        '<a href="downloads.html" class="btn" style="background:rgba(255,255,255,.16);color:#fff">' + PM_ICON("download") + esc(t("nav.downloads")) + '</a></div>' +
      '</div>' +
      '<div style="flex:0 0 42%;position:relative;min-width:240px"><img src="' + esc(c.image) + '" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></div>' +
    '</div>' +

    // Metakaarten
    '<div class="grid grid--4" style="margin-bottom:10px">' +
      metaCard("megaphone", t("camp.status"), PM_dict("statuses", c.status)) +
      metaCard("target", t("camp.audience"), PM_dict("audiences", c.audience)) +
      metaCard("calendar", t("camp.period"), PM_dict("periods", c.period)) +
      metaCard("user", t("camp.owner"), c.owner || "PlasmaMade Marketing") +
    '</div>' +

    '<div class="grid" style="grid-template-columns:1fr 320px;gap:28px;align-items:start;margin-top:18px">' +
      '<div>' +
        '<div class="card" style="margin-bottom:20px"><div class="card__body">' +
          '<h3 style="margin-bottom:10px">' + esc(t("camp.about")) + '</h3><p>' + esc(lc("campaigns", c.id, "description", c.description)) + '</p>' +
          (c.goal ? '<div class="callout" style="margin-top:14px"><strong>' + esc(t("camp.goal")) + ':</strong> ' + esc(lc("campaigns", c.id, "goal", c.goal)) + '</div>' : '') +
          '<div class="callout" style="margin-top:14px"><strong>' + esc(t("camp.core")) + '</strong> ' + esc(core) + '</div>' +
          '<div class="flex items-center gap wrap" style="margin-top:14px"><span class="muted" style="font-size:12.5px;font-weight:700">' + esc(t("camp.channels")) + ':</span>' +
            (c.channels || []).map(function (ch) { return '<span class="tag-static">' + esc(ch) + '</span>'; }).join("") + '</div>' +
        '</div></div>' +

        '<div class="section-title"><h3>' + esc(t("camp.captions")) + '</h3><div class="line"></div></div>' +
        '<div class="grid" style="gap:14px" id="captions"></div>' +

        (assets.length ? '<div class="section-title"><h3>' + esc(t("camp.assets")) + '</h3><div class="line"></div><a class="more" href="marketing.html">' + esc(t("camp.moreMaterial")) + '</a></div>' +
          '<div class="grid grid--3" id="camp-assets"></div>' : '') +
      '</div>' +

      '<aside>' +
        '<div class="card" style="position:sticky;top:88px"><div class="card__body">' +
          '<h4 style="margin-bottom:12px">' + esc(t("camp.planning")) + '</h4><ul class="icon-list" style="gap:10px">' +
          planning.map(function (p) { return '<li><span class="li-ico">' + PM_ICON("check") + '</span><div><p style="font-size:13px;color:var(--ink)">' + esc(p) + '</p></div></li>'; }).join("") +
          '</ul><div class="divider"></div>' +
          '<h4 style="margin-bottom:6px">' + esc(t("camp.templates")) + '</h4><p class="muted" style="font-size:13px;margin-bottom:12px">' + esc(t("camp.templatesText")) + '</p>' +
          '<a href="studio.html" class="btn btn--primary btn--sm btn--block">' + PM_ICON("palette") + esc(t("common.openStudio")) + '</a>' +
        '</div></div>' +
      '</aside>' +
    '</div>';

  // Captions als kopieerblokken
  document.getElementById("captions").innerHTML = captions.map(function (cap, i) {
    return '<div class="copy-block"><h5>' + esc(t("camp.caption", { n: i + 1 })) + '</h5><button class="copy-btn" type="button" data-copy="' + i + '">' + PM_ICON("copy") + esc(t("common.copy")) + '</button>' +
      '<div class="txt">' + esc(cap) + '</div></div>';
  }).join("");
  document.querySelectorAll("#captions .copy-btn").forEach(function (b) {
    b.addEventListener("click", function () {
      var idx = +b.getAttribute("data-copy");
      PM_copy(captions[idx], function () {
        b.closest(".copy-block").classList.add("copied");
        b.innerHTML = PM_ICON("check") + esc(t("common.copied"));
        PM_toast(t("camp.captionCopied"));
        setTimeout(function () { b.closest(".copy-block").classList.remove("copied"); b.innerHTML = PM_ICON("copy") + esc(t("common.copy")); }, 1800);
      });
    });
  });

  // Assets
  var ca = document.getElementById("camp-assets");
  if (ca) ca.innerHTML = assets.map(function (m) {
    var dl = m.file ? D.downloads.find(function (x) { return x.id === m.file; }) : null;
    var href = dl ? "assets/downloads/" + dl.file + (dl.type === "ZIP" ? ".zip" : ".pdf") : m.img;
    var mTitle = lc("marketing", m.id, "title", m.title);
    return '<a class="asset" href="' + esc(href) + '" download>' +
      '<div class="asset__thumb"><img src="' + esc(m.img) + '" alt="' + esc(mTitle) + '" loading="lazy"></div>' +
      '<div class="asset__body"><span class="asset__cat">' + esc(PM_dict("categories", m.category)) + '</span><h4>' + esc(mTitle) + '</h4></div></a>';
  }).join("");
};
</script>
<script src="assets/js/sync-config.js?v=20260630-rollback-stable-bjorn-1"></script>
<script src="assets/js/app.js?v=20260630-rollback-stable-bjorn-1"></script>
</body>
</html>
